services:
  # --- BACKEND API ---
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: verbatim_api
    command: >
      sh -c "alembic upgrade head && 
             uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=postgres
      - MINIO_ENDPOINT=minio:9000
      - REDIS_HOST=redis
    volumes:
      - ./backend/src:/app/src
      - ./backend/migrations:/app/migrations
      - ./backend/alembic.ini:/app/alembic.ini
      - shared_uploads:/app/temp_uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # --- CELERY WORKER (ML Pipeline) ---
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: verbatim_worker
    command: celery -A src.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=postgres
      - MINIO_ENDPOINT=minio:9000
      - REDIS_HOST=redis
    volumes:
      - ./backend/src:/app/src
      - shared_uploads:/app/temp_uploads
      - gigaam_models:/root/.cache/gigaam
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # --- FRONTEND (Nginx) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: verbatim_frontend
    ports:
      - "4200:80"
    depends_on:
      - api

  # --- INFRASTRUCTURE ---
  redis:
    image: redis:8-alpine
    container_name: verbatim_redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:18-alpine
    container_name: verbatim_postgres
    restart: always
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: verbatim_minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_KMS_SECRET_KEY: ${MINIO_KMS_SECRET_KEY}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - minio_data:/data

volumes:
  shared_uploads:
  postgres_data:
  redis_data:
  minio_data:
  gigaam_models:
  huggingface_cache: